<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crazy Pop - Arcade Lobby</title>
    <style>
        /* --- ESTILOS GLOBALES Y FONDO RETRO ARCADE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, sans-serif; /* Tipografía más arcade/pixel */
        }

        body {
            /* Fondo oscuro con cuadrícula de neón estilo laberinto de Pac-Man */
            background-color: #080810; 
            background-image: 
                linear-gradient(rgba(18, 16, 32, 0.85) 0%, rgba(18, 16, 32, 0.85) 100%),
                linear-gradient(90deg, rgba(33, 150, 243, 0.15) 1px, transparent 1px),
                linear-gradient(rgba(33, 150, 243, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Efecto de líneas de TV antigua (CRT Scanlines) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 32, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- ANIMACIONES --- */
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 0 0 8px #ff007f, 0 0 15px #ff007f, 0 0 30px #ff007f;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        /* --- MENÚ DE NAVEGACIÓN SUPERIOR --- */
        header {
            background-color: #000000;
            padding: 15px 20px;
            border-bottom: 4px solid #00ffff; /* Azul cian estilo arcade */
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 255, 255, 0.3);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Texto de la marca limpio y con parpadeo */
        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            color: #ff007f; /* Rosa fosforescente */
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: neonFlicker 6s infinite alternate;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: #39ff14; /* Verde neón */
            font-weight: bold;
            padding: 8px 16px;
            border: 2px solid transparent;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            font-size: 0.95rem;
        }

        /* Efecto de selección estilo menú de juego retro */
        .nav-links a:hover, .nav-links a.active {
            border-color: #39ff14;
            background-color: rgba(57, 255, 20, 0.1);
            color: #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            transform: scale(1.05);
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Tarjeta con bordes dobles simulando pantalla de Arcade */
        .welcome-card {
            background-color: #000000;
            border: 4px dashed #00ffff; /* Bordes discontinuos tipo retro */
            outline: 4px solid #ff007f; /* Doble borde neón */
            border-radius: 4px; /* Menos redondeado, más pixel */
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 0 35px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(255, 0, 127, 0.2);
            max-width: 650px;
            width: 100%;
            animation: floatUp 0.6s ease-out forwards;
        }

        h1 {
            color: #ccff00; /* Amarillo limón */
            font-size: 3.2rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ccff00;
        }

        p {
            color: #ffffff;
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .highlight-text {
            color: #00ffff;
            font-weight: bold;
            text-shadow: 0 0 8px #00ffff;
        }

        /* Botón estilo "INSERT COIN / START" */
        .btn-neon {
            display: inline-block;
            padding: 15px 40px;
            background-color: #ff007f;
            color: #ffffff;
            border: 3px solid #ffffff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px #ff007f;
            letter-spacing: 2px;
        }

        .btn-neon:hover {
            background-color: transparent;
            color: #ff007f;
            border-color: #ff007f;
            box-shadow: 0 0 25px #ff007f;
            transform: scale(1.1);
        }

        /* --- PIE DE PÁGINA --- */
        footer {
            background-color: #000000;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #555555;
            border-top: 4px solid #ff007f;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo-text">Crazy Pop</div>
            
            <ul class="nav-links">
                <li><a href="index.html" class="active">Lobby</a></li>
                <li><a href="1.html">Sección 1</a></li>
                <li><a href="2.html">Sección 2</a></li>
                <li><a href="3.html">Sección 3</a></li>
                <li><a href="4.html">Sección 4</a></li>
                <li><a href="5.html">Sección 5</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="welcome-card">
            <h1>INSERT COIN</h1>
            <p>Estás en el lobby arcade de <span class="highlight-text">Crazy Pop</span>. Prepárate para una experiencia pixelada bajo cero llena de acción y sabor retro.</p>
            <a href="1.html" class="btn-neon">PLAY GAME</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Crazy Pop Arcade - Todos los derechos reservados.</p>
    </footer>

</body>
</html>
